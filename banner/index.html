<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banner — Kirtash Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Manrope:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #07070c;
            /* Kotlin brand colors */
            --k-orange: #E44857;
            --k-pink: #C711E1;
            --k-purple: #7F52FF;
            --cyan: #00D4FF;
            --text: #ffffff;
        }

        html, body {
            width: 4096px;
            height: 2304px;
            background: var(--bg);
            font-family: 'Manrope', 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .banner {
            width: 4096px;
            height: 2304px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(at 18% 22%, hsla(355, 73%, 58%, 0.42) 0px, transparent 50%),
                radial-gradient(at 78% 28%, hsla(290, 87%, 50%, 0.38) 0px, transparent 50%),
                radial-gradient(at 65% 82%, hsla(258, 100%, 66%, 0.42) 0px, transparent 55%),
                radial-gradient(at 22% 88%, hsla(190, 100%, 50%, 0.22) 0px, transparent 50%),
                var(--bg);
        }

        /* Subtle blueprint grid */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 160px 160px;
            opacity: 0.6;
        }

        /* Vertical gradient stripes — brand identity bars */
        .stripe {
            position: absolute;
            width: 8px;
            top: 18%;
            bottom: 18%;
            background: linear-gradient(180deg,
                transparent,
                var(--k-orange),
                var(--k-pink),
                var(--k-purple),
                transparent
            );
            border-radius: 100px;
            opacity: 0.75;
        }
        .stripe-l { left: 4.2%; }
        .stripe-r { right: 4.2%; }

        /* Color chips palette — top-left brand identity reference */
        .chips {
            position: absolute;
            top: 110px;
            left: 110px;
            display: flex;
            align-items: center;
            gap: 22px;
            z-index: 4;
        }

        .chip {
            width: 78px; height: 78px;
            border-radius: 18px;
            box-shadow: 0 20px 40px -8px rgba(0,0,0,0.5);
        }

        .chip-1 { background: var(--k-orange); }
        .chip-2 { background: var(--k-pink); }
        .chip-3 { background: var(--k-purple); }
        .chip-4 { background: var(--cyan); }
        .chip-5 { background: var(--text); }

        .chips-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-left: 16px;
        }

        /* Center brand wordmark */
        .center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 90px;
            z-index: 5;
            padding: 0 200px;
        }

        .top-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 52px;
            font-weight: 400;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.55);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 32px;
        }

        .top-label::before, .top-label::after {
            content: '';
            width: 90px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45));
            border-radius: 1px;
        }
        .top-label::after {
            background: linear-gradient(90deg, rgba(255,255,255,0.45), transparent);
        }

        .wordmark {
            font-family: 'Manrope', 'Inter', sans-serif;
            font-size: 640px;
            font-weight: 800;
            letter-spacing: -0.055em;
            line-height: 0.85;
            display: flex;
            align-items: baseline;
        }

        .wordmark .name {
            background: linear-gradient(135deg,
                var(--k-orange) 0%,
                var(--k-pink) 50%,
                var(--k-purple) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 40px 100px rgba(199, 17, 225, 0.35));
        }

        .wordmark .dot {
            color: var(--cyan);
            font-weight: 800;
        }

        .wordmark .ext {
            color: var(--text);
            font-weight: 800;
        }

        .tagline-wrap {
            display: flex;
            align-items: center;
            gap: 56px;
        }

        .gbar {
            width: 220px;
            height: 4px;
            background: linear-gradient(90deg,
                transparent,
                var(--k-pink) 40%,
                var(--k-purple) 70%,
                transparent
            );
            border-radius: 2px;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 54px;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .tagline .sep {
            color: var(--k-pink);
            margin: 0 24px;
        }

        /* corners */
        .corner {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 34px;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .corner-tr { top: 110px; right: 110px; }
        .corner-bl { bottom: 100px; left: 110px; }
        .corner-br { bottom: 100px; right: 110px; }

        /* grain */
        .grain {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            mix-blend-mode: overlay;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

<div class="banner">
    <div class="grid"></div>

    <!-- Vertical brand stripes (decorative) -->
    <div class="stripe stripe-l"></div>
    <div class="stripe stripe-r"></div>

    <!-- Color palette chips -->
    <div class="chips">
        <div class="chip chip-1"></div>
        <div class="chip chip-2"></div>
        <div class="chip chip-3"></div>
        <div class="chip chip-4"></div>
        <div class="chip chip-5"></div>
        <span class="chips-label">brand · palette</span>
    </div>

    <!-- Corner marks -->
    <div class="corner corner-tr">brand · v.2026</div>
    <div class="corner corner-bl">EST. 2026 · MADRID, ES</div>
    <div class="corner corner-br">aldro25@gmail.com</div>

    <!-- Center brand wordmark -->
    <div class="center">
        <div class="top-label">Mobile · Software · Studio</div>

        <h1 class="wordmark">
            <span class="name">kirtash</span><span class="dot">.</span><span class="ext">dev</span>
        </h1>

        <div class="tagline-wrap">
            <div class="gbar"></div>
            <div class="tagline">Android <span class="sep">·</span> iOS <span class="sep">·</span> Cross-platform</div>
            <div class="gbar"></div>
        </div>
    </div>

    <div class="grain"></div>
</div>

</body>
</html>
